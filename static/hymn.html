<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>찬송가 동시 보기 - Antigravity</title>
    <link rel="stylesheet" href="hymn.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app" class="split-view">
        <!-- 상단: 악보 영역 (60%) -->
        <div id="score-container" class="score-view">
            <div id="score-wrapper">
                <img id="score-img" src="hymn_sample.png" alt="찬송가 악보">
            </div>
            <div class="score-overlay">
                <button id="btn-fullscreen-score" title="악보 크게 보기">⛶</button>
            </div>
        </div>

        <!-- 구분선 (조절 가능한 바 - 나중에 구현 가능) -->
        <div class="divider"></div>

        <!-- 하단: 가사 영역 (40%) -->
        <div id="lyrics-container" class="lyrics-view">
            <div class="lyrics-controls">
                <div class="control-row">
                    <label for="font-size">글자 크기:</label>
                    <input type="range" id="font-size" min="16" max="48" value="24">
                    <span id="font-size-val">24px</span>
                </div>
                <div class="btn-group">
                    <button id="btn-high-contrast" class="toggle-btn">고대비 모드</button>
                    <button id="btn-sync-scroll" class="toggle-btn active">스크롤 연동</button>
                    <button id="btn-fullscreen-lyrics" title="가사 크게 보기">☰</button>
                </div>
            </div>
            <div id="lyrics-content" class="lyrics-text">
                <h2>찬송가 1장 - 만복의 근원 하나님</h2>
                <p>1. 만복의 근원 하나님 온 백성 찬양 드리고</p>
                <p>저 천사여 찬송하세 성부 성자 성령 아멘</p>
                <!-- 샘플 반복 -->
                <p>다 함께 기쁜 마음으로 주님을 찬양합니다.</p>
                <p>우리의 영혼이 주를 앙망하며</p>
                <p>새 노래로 그 이름을 높여 드립니다.</p>
                <p>생명의 말씀이 우리 가운데 풍성하며</p>
                <p>은혜의 강물이 우리 영혼에 넘쳐납니다.</p>
                <p>할렐루야, 전능하신 주 하나님이 통치하시네.</p>
                <p>영광과 존귀와 찬양을 영원히 받으소서.</p>
            </div>
        </div>

        <!-- 하단 고정 컨트롤 (Z Flip 플렉스 모드 시 아래 화면에 표시) -->
        <div id="bottom-controls" class="flex-controls">
            <button id="btn-prev">이전 곡</button>
            <div id="flex-info">플렉스 모드 활성</div>
            <button id="btn-next">다음 곡</button>
        </div>
    </div>

    <!-- 설정 모달/레이어 (필요시) -->
    
    <script src="hymn.js"></script>
</body>
</html>
