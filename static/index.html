<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grace Bible & Hymnal | 성경과 찬송가</title>
    <meta name="description" content="고화질 악보와 함께하는 프리미엄 성경 찬송가 앱. 언제 어디서나 하나님의 말씀을 묵상하고 찬양하세요.">
    <meta name="keywords" content="성경, 찬송가, 악보, 말씀, 묵상, 기독교, Bible, Hymnal">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d15391.js" crossorigin="anonymous"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Navigation Bar -->
        <nav class="glass-nav">
            <div class="logo">GRACE</div>
            <div class="nav-links">
                <button onclick="showPage('bible')"><i class="fas fa-bible"></i> 성경</button>
                <button onclick="showPage('hymnal')"><i class="fas fa-music"></i> 찬송가</button>
                <button onclick="showPage('bookmark')"><i class="fas fa-bookmark"></i> 북마크</button>
            </div>
        </nav>

        <main class="content">
            <!-- Bible Page -->
            <section id="bible-page" class="page active">
                <div class="header">
                    <h1>성경 말씀</h1>
                    <div class="selectors">
                        <select id="book-select" onchange="loadChapters()"></select>
                        <select id="chapter-select" onchange="loadVerses()"></select>
                        <div class="font-control">
                            <i class="fas fa-font"></i>
                            <input type="range" id="font-slider" min="1" max="3" step="0.1" value="1.4" oninput="changeFontSize(this.value)">
                        </div>
                    </div>
                </div>
                <div id="verses-container" class="scroll-container"></div>
            </section>

            <!-- Hymnal Page -->
            <section id="hymnal-page" class="page">
                <div class="header">
                    <h1>찬송가</h1>
                    <div class="search-box">
                        <input type="text" id="hymn-search" placeholder="제목 또는 번호 검색..." oninput="searchHymns()">
                    </div>
                </div>
                <div id="hymnal-list" class="grid-container"></div>
            </section>

            <!-- Hymn Detail View -->
            <section id="hymn-detail" class="page">
                <button class="back-btn" onclick="showPage('hymnal')"><i class="fas fa-arrow-left"></i> 목록으로</button>
                <div id="hymn-content" class="detail-container"></div>
            </section>

            <!-- Bookmark Page -->
            <section id="bookmark-page" class="page">
                <div class="header">
                    <h1>북마크</h1>
                    <p class="text-dim">저장된 말씀과 찬송가입니다.</p>
                </div>
                <div id="bookmarks-container" class="grid-container"></div>
            </section>
        </main>

        <!-- Tooltips / Overlays -->
        <div id="overlay" class="hidden"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
