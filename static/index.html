
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나만의 클린 성경 - Clean Bible Offline</title>
    <link rel="stylesheet" href="/static/style.css?v=9">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="theme-color" content="#1a73e8">
</head>
<body class="light-mode">
    <div id="app">
        <!-- Header -->
        <header>
            <div class="logo">
                <button id="navToggleBtn"><i class="fas fa-bars"></i></button>
                <i class="fas fa-bible"></i>
                <span>클린 성경</span>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="성경 검색...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="header-actions">
                <a href="/static/hymn.html" id="hymnBtn" title="찬송가 보기" style="color: white; font-size: 20px; margin-right: 15px; text-decoration: none;"><i class="fas fa-music"></i></a>
                <button id="bookmarkBtn"><i class="fas fa-bookmark"></i></button>
                <button id="themeToggle"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <!-- Main Content Area -->
        <!-- Main Content Area -->
        <main>
            <!-- Bible ViewContainer -->
            <div id="bible-view" class="view-container active">
                <nav id="navDrawer" class="active">
                    <div class="nav-tabs">
                        <button class="nav-tab active" data-tab="OT">구약</button>
                        <button class="nav-tab" data-tab="NT">신약</button>
                    </div>
                    <div class="book-list" id="bookList"></div>
                    <div class="chapter-list hidden" id="chapterList">
                        <button class="back-to-books"><i class="fas fa-chevron-left"></i> 목록으로</button>
                        <h3 id="selectedBookName">창세기</h3>
                        <div class="chapters-grid" id="chaptersGrid"></div>
                    </div>
                </nav>

                <section id="reader">
                    <div id="readerHeader">
                        <h2 id="currentLocation">반가워요! 성경을 선택해주세요.</h2>
                        <div class="font-settings">
                            <i class="fas fa-font"></i>
                            <input type="range" id="fontSizeSlider" min="14" max="40" value="18">
                            <button id="fullscreenToggleBtn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                    <div id="versesContainer">
                        <div class="welcome-screen">
                            <i class="fas fa-hands-praying"></i>
                            <p>원하시는 성경 구절을 선택하여 읽어보세요.</p>
                        </div>
                    </div>
                    <button id="exitFullscreenBtn" onclick="toggleFullscreen()" class="hidden floating-exit-btn">
                        <i class="fas fa-compress"></i> 닫기
                    </button>
                </section>
            </div>

            <!-- Hymn View Container -->
            <div id="hymn-view" class="view-container">
                <div class="hymn-search-box">
                    <div class="numpad-display">
                        <input type="text" id="hymn-number-input" placeholder="장 번호 입력..." readonly>
                        <button id="hymn-go-btn">Go</button>
                    </div>
                    <div class="numpad">
                        <button class="num-btn">1</button><button class="num-btn">2</button><button class="num-btn">3</button>
                        <button class="num-btn">4</button><button class="num-btn">5</button><button class="num-btn">6</button>
                        <button class="num-btn">7</button><button class="num-btn">8</button><button class="num-btn">9</button>
                        <button class="num-btn reset">C</button><button class="num-btn">0</button><button class="num-btn del">←</button>
                    </div>
                    <div class="text-search">
                        <input type="text" id="hymn-text-input" placeholder="가사 또는 제목 검색...">
                        <button id="hymn-search-btn"><i class="fas fa-search"></i></button>
                    </div>
                </div>
                <div id="hymn-reader" class="hidden">
                    <div class="hymn-reader-header">
                        <button id="back-to-hymn-search"><i class="fas fa-arrow-left"></i></button>
                        <h3 id="hymn-title">제목</h3>
                        <div class="hymn-actions">
                            <button id="hymn-toggle-split" title="악보/가사 전환"><i class="fas fa-columns"></i></button>
                            <button id="hymn-wake-lock" title="화면 유지"><i class="fas fa-sun"></i></button>
                        </div>
                    </div>
                    <div id="hymn-content" class="split-layout">
                        <div id="hymn-score-view" class="hymn-score-view">
                            <img id="hymn-score-img" src="" alt="악보">
                        </div>
                        <div id="hymn-lyrics-view" class="hymn-lyrics-view">
                            <div id="hymn-lyrics-text">가사</div>
                        </div>
                    </div>
                </div>
                <div id="hymn-results" class="results-list hidden"></div>
            </div>
        </main>

        <!-- Bottom Tab Bar -->
        <nav class="bottom-tab-bar">
            <button class="tab-item active" data-view="bible">
                <i class="fas fa-book-open"></i>
                <span>성경</span>
            </button>
            <button class="tab-item" data-view="hymn">
                <i class="fas fa-music"></i>
                <span>찬송가</span>
            </button>
        </nav>

        <!-- Search Results Modal -->
        <div id="searchModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>검색 결과</h3>
                    <span class="close">&times;</span>
                </div>
                <div id="searchResults" class="results-list"></div>
            </div>
        </div>

        <!-- Bookmarks Modal -->
        <div id="bookmarkModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>내 북마크</h3>
                    <span class="close">&times;</span>
                </div>
                <div id="bookmarkResults" class="results-list"></div>
            </div>
        </div>
    </div>

    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
    <script src="/static/app.js?v=9"></script>
</body>
</html>
